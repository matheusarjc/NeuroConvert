<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg-base); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .label { font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: var(--color-fg-3); text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: var(--radius-full);
    font-family: var(--font-ui); font-size: 11px; font-weight: 600;
    letter-spacing: 0.3px; white-space: nowrap;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="label">Score Status Badges</div>
  <div class="row">
    <span class="badge" style="background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.25)">
      <span class="dot" style="background:#EF4444"></span> Crítico · 0–39
    </span>
    <span class="badge" style="background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.25)">
      <span class="dot" style="background:#F59E0B"></span> Atenção · 40–69
    </span>
    <span class="badge" style="background:rgba(34,197,94,0.12);color:#22C55E;border:1px solid rgba(34,197,94,0.25)">
      <span class="dot" style="background:#22C55E"></span> Bom · 70–100
    </span>
  </div>
  <div class="label">Status Badges</div>
  <div class="row">
    <span class="badge" style="background:rgba(29,158,117,0.12);color:#1D9E75;border:1px solid rgba(29,158,117,0.25)">Publicado</span>
    <span class="badge" style="background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.25)">Em análise</span>
    <span class="badge" style="background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.25)">Erro</span>
    <span class="badge" style="background:var(--color-bg-elevated);color:var(--color-fg-2);border:1px solid var(--color-border)">Rascunho</span>
    <span class="badge" style="background:rgba(56,189,248,0.12);color:#38BDF8;border:1px solid rgba(56,189,248,0.25)">Novo</span>
  </div>
  <div class="label">Plan Badges</div>
  <div class="row">
    <span class="badge" style="background:var(--color-bg-elevated);color:var(--color-fg-2);border:1px solid var(--color-border)">Free</span>
    <span class="badge" style="background:rgba(29,158,117,0.12);color:#1D9E75;border:1px solid rgba(29,158,117,0.3)">Pro</span>
    <span class="badge" style="background:linear-gradient(135deg,rgba(29,158,117,0.2),rgba(56,189,248,0.15));color:#FFFFFF;border:1px solid rgba(255,255,255,0.15)">Enterprise</span>
  </div>
</body>
</html>
