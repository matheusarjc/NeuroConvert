<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg-base); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .label { font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: var(--color-fg-3); text-transform: uppercase; letter-spacing: 0.5px; }
  .scale { display: flex; align-items: flex-end; gap: 8px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--color-primary); border-radius: 2px; width: 28px; }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--color-fg-3); }
  .token { font-family: var(--font-mono); font-size: 9px; color: var(--color-fg-2); }
</style>
</head>
<body>
  <div class="label">Spacing Scale — Base 4px</div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="val">4</div><div class="token">--1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="val">8</div><div class="token">--2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="val">12</div><div class="token">--3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="val">16</div><div class="token">--4</div></div>
    <div class="step"><div class="bar" style="height:20px"></div><div class="val">20</div><div class="token">--5</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="val">24</div><div class="token">--6</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="val">32</div><div class="token">--8</div></div>
    <div class="step"><div class="bar" style="height:40px"></div><div class="val">40</div><div class="token">--10</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="val">48</div><div class="token">--12</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="val">64</div><div class="token">--16</div></div>
    <div class="step"><div class="bar" style="height:80px"></div><div class="val">80</div><div class="token">--20</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="val">96</div><div class="token">--24</div></div>
  </div>
</body>
</html>
