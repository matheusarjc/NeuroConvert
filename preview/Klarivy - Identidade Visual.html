  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"cb0ae61a-2f1d-4fbe-be7d-2772027e1128\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9afe8084-7586-4241-8e3f-2bf42fc8b390\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"92551ad1-09a3-4b8a-813d-036f54ce16d7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"24a3d188-0530-4f58-b7c6-6c2b2ebc7354\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root {\n      --bg:       #0A0A0A;\n      --surface:  #141414;\n      --elevated: #1C1C1C;\n      --raised:   #242424;\n      --border:   rgba(255,255,255,0.08);\n      --bd-str:   rgba(255,255,255,0.14);\n      --p:        #1D9E75;\n      --pl:       #25C98F;\n      --pm:       rgba(29,158,117,0.12);\n      --pg:       rgba(29,158,117,0.28);\n      --f1:       #FFFFFF;\n      --f2:       #9CA3AF;\n      --f3:       #4B5563;\n      --dsp:      'Space Grotesk', system-ui, sans-serif;\n      --ui:       'DM Sans', system-ui, sans-serif;\n      --mono:     'JetBrains Mono', monospace;\n    }\n\n    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n\n    body {\n      background: var(--bg);\n      color: var(--f1);\n      font-family: var(--ui);\n      line-height: 1.6;\n      min-height: 100vh;\n    }\n\n    /* ── NAV ── */\n    nav {\n      position: sticky; top: 0; z-index: 100;\n      padding: 16px 48px;\n      border-bottom: 1px solid var(--border);\n      background: rgba(10,10,10,0.88);\n      backdrop-filter: blur(14px);\n      display: flex; align-items: center; justify-content: space-between;\n    }\n    .nav-left { display: flex; align-items: center; gap: 10px; }\n    .nav-wm {\n      font-family: var(--dsp); font-weight: 700; font-size: 18px;\n      letter-spacing: -0.02em; color: var(--f1); line-height: 1;\n    }\n    .nav-tag {\n      font-family: var(--mono); font-size: 10px; color: var(--f3);\n      letter-spacing: 0.07em;\n    }\n\n    /* ── WRAP / SECTIONS ── */\n    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 48px; }\n\n    .sec {\n      padding: 88px 0;\n      border-bottom: 1px solid var(--border);\n    }\n    .sec:last-child { border-bottom: none; padding-bottom: 120px; }\n\n    .sec-lbl {\n      font-family: var(--mono); font-size: 11px; font-weight: 500;\n      text-transform: uppercase; letter-spacing: 0.14em;\n      color: var(--p); margin-bottom: 8px;\n    }\n    .sec-title {\n      font-family: var(--dsp); font-size: 26px; font-weight: 600;\n      color: var(--f1); line-height: 1.2; margin-bottom: 10px;\n    }\n    .sec-desc {\n      font-size: 14px; color: var(--f2); line-height: 1.8;\n      max-width: 520px; margin-bottom: 52px;\n    }\n\n    /* ── HERO ── */\n    .hero {\n      padding: 128px 0 108px;\n      text-align: center;\n      position: relative;\n      border-bottom: 1px solid var(--border);\n      overflow: hidden;\n    }\n    .hero-glow {\n      position: absolute; inset: 0; pointer-events: none;\n      background: radial-gradient(ellipse 700px 420px at 50% 20%, rgba(29,158,117,0.11) 0%, transparent 68%);\n    }\n    .hero-lockup {\n      position: relative;\n      display: flex; align-items: center; justify-content: center;\n      gap: 28px; margin-bottom: 32px;\n      animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both;\n    }\n    .hero-icon-wrap {\n      position: relative;\n    }\n    .hero-icon-halo {\n      position: absolute;\n      top: 50%; left: 50%;\n      transform: translate(-50%, -50%);\n      width: 200px; height: 200px;\n      background: radial-gradient(circle, rgba(29,158,117,0.18) 0%, transparent 65%);\n      pointer-events: none;\n    }\n    .hero-wm {\n      font-family: var(--dsp); font-weight: 700;\n      font-size: 72px; letter-spacing: -0.03em;\n      color: var(--f1); line-height: 1;\n    }\n    .hero-sub {\n      font-family: var(--mono); font-size: 11px;\n      text-transform: uppercase; letter-spacing: 0.12em;\n      color: var(--f3);\n      animation: rise 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;\n    }\n    @keyframes rise {\n      from { opacity: 0; transform: translateY(18px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n\n    /* ── GRIDS ── */\n    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n    .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }\n\n    /* ── SHOWCASE CARDS ── */\n    .card {\n      border-radius: 14px;\n      border: 1px solid var(--border);\n      padding: 52px 28px 24px;\n      display: flex; flex-direction: column;\n      align-items: center; gap: 24px;\n    }\n    .c-bg      { background: var(--bg); }\n    .c-surface { background: var(--surface); }\n    .c-light   { background: #E2E8F0; }\n    .c-white   { background: #FFFFFF; }\n    .c-emerald { background: var(--p); }\n\n    .card-lbl {\n      font-family: var(--mono); font-size: 10px;\n      letter-spacing: 0.07em; text-align: center;\n      color: var(--f3);\n    }\n    .c-light .card-lbl,\n    .c-white .card-lbl { color: #64748B; }\n    .c-emerald .card-lbl { color: rgba(10,10,10,0.45); }\n\n    /* ── ANATOMY ── */\n    .anatomy-grid {\n      display: grid;\n      grid-template-columns: 240px 1fr;\n      gap: 72px;\n      align-items: center;\n    }\n    .anatomy-icon-wrap {\n      position: relative;\n      display: flex; align-items: center; justify-content: center;\n    }\n    .anatomy-halo {\n      position: absolute; inset: -32px;\n      background: radial-gradient(circle, rgba(29,158,117,0.12) 0%, transparent 65%);\n      border-radius: 50%;\n    }\n    .anatomy-notes { display: flex; flex-direction: column; gap: 30px; }\n    .an-item { display: flex; gap: 16px; align-items: flex-start; }\n    .an-num {\n      flex-shrink: 0;\n      width: 28px; height: 28px; border-radius: 50%;\n      background: var(--pm); border: 1px solid rgba(29,158,117,0.3);\n      display: flex; align-items: center; justify-content: center;\n      font-family: var(--mono); font-size: 11px; font-weight: 500;\n      color: var(--p);\n    }\n    .an-text h4 {\n      font-size: 13px; font-weight: 600; color: var(--f1);\n      margin-bottom: 4px;\n    }\n    .an-text p { font-size: 13px; color: var(--f2); line-height: 1.65; }\n\n    /* ── LOCKUP VARIATIONS ── */\n    .lockup { display: flex; align-items: center; gap: 12px; }\n    .lockup-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }\n    .lwm {\n      font-family: var(--dsp); font-weight: 700;\n      letter-spacing: -0.02em; color: var(--f1); line-height: 1;\n    }\n\n    /* ── SCALE ── */\n    .scale-track {\n      display: flex; align-items: flex-end; gap: 40px;\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 14px;\n      padding: 48px 52px 40px;\n    }\n    .scale-item { display: flex; flex-direction: column; align-items: center; gap: 14px; }\n    .scale-sz {\n      font-family: var(--mono); font-size: 10px; color: var(--f3);\n    }\n\n    /* ── CONCEPT ── */\n    .concept-cols {\n      display: grid; grid-template-columns: 1fr 1fr; gap: 56px;\n    }\n    .cb { margin-bottom: 36px; }\n    .cb:last-child { margin-bottom: 0; }\n    .cb h3 {\n      font-family: var(--dsp); font-size: 14px; font-weight: 600;\n      color: var(--f1); margin-bottom: 10px;\n    }\n    .cb p { font-size: 14px; color: var(--f2); line-height: 1.82; }\n    .cb p + p { margin-top: 10px; }\n\n    .chip {\n      display: inline-flex; align-items: center; gap: 8px;\n      margin-top: 16px;\n      padding: 6px 14px; border-radius: 6px;\n      background: var(--pm); border: 1px solid rgba(29,158,117,0.22);\n      font-family: var(--mono); font-size: 12px; color: var(--p);\n    }\n    .chip-dot {\n      width: 10px; height: 10px; border-radius: 50%; background: var(--p);\n    }\n\n    /* ── RULES ── */\n    .rule {\n      border-radius: 10px; padding: 24px 26px;\n      border: 1px solid;\n    }\n    .rule-do {\n      background: rgba(34,197,94,0.04);\n      border-color: rgba(34,197,94,0.18);\n    }\n    .rule-dont {\n      background: rgba(239,68,68,0.04);\n      border-color: rgba(239,68,68,0.18);\n    }\n    .rule-tag {\n      display: inline-block;\n      font-family: var(--mono); font-size: 10px; font-weight: 600;\n      text-transform: uppercase; letter-spacing: 0.1em;\n      padding: 3px 8px; border-radius: 4px;\n      margin-bottom: 11px;\n    }\n    .rule-do   .rule-tag { background: rgba(34,197,94,0.15);  color: #22C55E; }\n    .rule-dont .rule-tag { background: rgba(239,68,68,0.15);  color: #EF4444; }\n    .rule p { font-size: 13px; color: var(--f2); line-height: 1.7; }\n\n    /* ── DIVIDER ── */\n    .divider {\n      height: 1px; background: var(--border); margin: 0;\n    }\n  <\u002Fstyle>\n  \n<\u002Fhead>\n<body>\n\n<!-- ════════════════════════════════════════\n     NAV\n════════════════════════════════════════ -->\n<nav>\n  <div class=\"nav-left\">\n    <svg width=\"26\" height=\"26\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n      <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#141414\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n      <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n      <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n      <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n      <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n    <\u002Fsvg>\n    <span class=\"nav-wm\">klarivy<\u002Fspan>\n  <\u002Fdiv>\n  <span class=\"nav-tag\">Identidade Visual · v1.0<\u002Fspan>\n<\u002Fnav>\n\n<!-- ════════════════════════════════════════\n     HERO\n════════════════════════════════════════ -->\n<div class=\"hero\">\n  <div class=\"hero-glow\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-lockup\">\n      <div class=\"hero-icon-wrap\">\n        <div class=\"hero-icon-halo\"><\u002Fdiv>\n        <svg width=\"100\" height=\"100\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#141414\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <span class=\"hero-wm\">klarivy<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"hero-sub\">Identidade Visual · Klarivy · 2025<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"wrap\">\n\n  <!-- ════════════════════════════════════════\n       01 — ANATOMIA\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">01 — Símbolo<\u002Fdiv>\n    <h2 class=\"sec-title\">Anatomia da marca<\u002Fh2>\n    <p class=\"sec-desc\">O símbolo Klarivy reduz a letra K à sua estrutura geométrica essencial: três traços e um nó de convergência.<\u002Fp>\n\n    <div class=\"anatomy-grid\">\n      <div class=\"anatomy-icon-wrap\">\n        <div class=\"anatomy-halo\"><\u002Fdiv>\n        <svg width=\"220\" height=\"220\" viewBox=\"0 0 48 48\" fill=\"none\" aria-label=\"Klarivy mark\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#141414\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <!-- subtle grid lines for annotation feel -->\n          <line x1=\"15\" y1=\"4\" x2=\"15\" y2=\"44\" stroke=\"rgba(29,158,117,0.08)\" stroke-width=\"0.75\" stroke-dasharray=\"2 2\"><\u002Fline>\n          <line x1=\"4\" y1=\"24\" x2=\"44\" y2=\"24\" stroke=\"rgba(29,158,117,0.08)\" stroke-width=\"0.75\" stroke-dasharray=\"2 2\"><\u002Fline>\n          <!-- K strokes -->\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <!-- Node -->\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div class=\"anatomy-notes\">\n        <div class=\"an-item\">\n          <div class=\"an-num\">1<\u002Fdiv>\n          <div class=\"an-text\">\n            <h4>Haste vertical<\u002Fh4>\n            <p>O eixo estrutural do K — ancora a composição e define o alinhamento esquerdo do símbolo. Inicia e termina com caps arredondados.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"an-item\">\n          <div class=\"an-num\">2<\u002Fdiv>\n          <div class=\"an-text\">\n            <h4>Braços diagonais<\u002Fh4>\n            <p>Angulação de 28° a partir da horizontal — precisa o suficiente para parecer calculada, aberta o suficiente para não ser agressiva. Os dois braços são simétricos.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"an-item\">\n          <div class=\"an-num\">3<\u002Fdiv>\n          <div class=\"an-text\">\n            <h4>Nó de clareza<\u002Fh4>\n            <p>O círculo no ponto de junção dos três elementos. Representa a convergência — o momento em que dados se tornam insight. Usa o esmeralda primário em peso cheio.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"an-item\">\n          <div class=\"an-num\">4<\u002Fdiv>\n          <div class=\"an-text\">\n            <h4>Container<\u002Fh4>\n            <p>Quadrado arredondado, rx = 25% — compatível com grids de ícone iOS, Android e macOS. Mais contido que um círculo; mais moderno que um quadrado reto.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════════════════════════\n       02 — LOCKUPS\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">02 — Lockups<\u002Fdiv>\n    <h2 class=\"sec-title\">Variações de lockup<\u002Fh2>\n    <p class=\"sec-desc\">Quatro configurações para diferentes contextos de aplicação. O horizontal é o formato principal.<\u002Fp>\n\n    <div class=\"g2\">\n      <!-- Horizontal (primary) -->\n      <div class=\"card c-surface\">\n        <div class=\"lockup\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span class=\"lwm\" style=\"font-size:34px;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">HORIZONTAL — FORMATO PRINCIPAL<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Stacked -->\n      <div class=\"card c-surface\">\n        <div class=\"lockup-stack\">\n          <svg width=\"56\" height=\"56\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span class=\"lwm\" style=\"font-size:30px;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">VERTICAL EMPILHADO<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Mark only -->\n      <div class=\"card c-surface\">\n        <svg width=\"88\" height=\"88\" viewBox=\"0 0 48 48\" fill=\"none\" aria-label=\"Klarivy mark\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"card-lbl\">SÓ O SÍMBOLO<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Wordmark only -->\n      <div class=\"card c-surface\" style=\"justify-content:center;\">\n        <span class=\"lwm\" style=\"font-size:44px;\">klarivy<\u002Fspan>\n        <span class=\"card-lbl\">SÓ O WORDMARK<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════════════════════════\n       03 — APLICAÇÕES\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">03 — Fundos<\u002Fdiv>\n    <h2 class=\"sec-title\">Aplicações sobre fundos<\u002Fh2>\n    <p class=\"sec-desc\">A marca opera primariamente em fundos escuros. As versões clara e esmeralda são para contextos excepcionais.<\u002Fp>\n\n    <div class=\"g4\">\n      <!-- Dark / primary -->\n      <div class=\"card c-bg\">\n        <div class=\"lockup\" style=\"gap:10px;\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#141414\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span style=\"font-family:var(--dsp);font-weight:700;font-size:22px;letter-spacing:-0.02em;color:#FFFFFF;line-height:1;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">DARK — PRINCIPAL<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Surface -->\n      <div class=\"card c-surface\">\n        <div class=\"lockup\" style=\"gap:10px;\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span style=\"font-family:var(--dsp);font-weight:700;font-size:22px;letter-spacing:-0.02em;color:#FFFFFF;line-height:1;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">SURFACE — CARDS<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Light -->\n      <div class=\"card c-light\" style=\"border-color:rgba(0,0,0,0.08);\">\n        <div class=\"lockup\" style=\"gap:10px;\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#FFFFFF\" stroke=\"rgba(0,0,0,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span style=\"font-family:var(--dsp);font-weight:700;font-size:22px;letter-spacing:-0.02em;color:#0A0A0A;line-height:1;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">CLARO — EXCEPCIONAL<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Emerald -->\n      <div class=\"card c-emerald\" style=\"border-color:rgba(0,0,0,0.12);\">\n        <div class=\"lockup\" style=\"gap:10px;\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n            <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"rgba(255,255,255,0.18)\" stroke=\"rgba(255,255,255,0.35)\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#FFFFFF\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#FFFFFF\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#FFFFFF\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#FFFFFF\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span style=\"font-family:var(--dsp);font-weight:700;font-size:22px;letter-spacing:-0.02em;color:#FFFFFF;line-height:1;\">klarivy<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"card-lbl\">ESMERALDA<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════════════════════════\n       04 — ESCALA\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">04 — Escala<\u002Fdiv>\n    <h2 class=\"sec-title\">Escala mínima de uso<\u002Fh2>\n    <p class=\"sec-desc\">O símbolo mantém legibilidade até 20px. Abaixo disso, utilize apenas o wordmark.<\u002Fp>\n\n    <div class=\"scale-track\">\n      <div class=\"scale-item\">\n        <svg width=\"120\" height=\"120\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">120px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-item\">\n        <svg width=\"64\" height=\"64\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">64px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-item\">\n        <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">48px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-item\">\n        <svg width=\"32\" height=\"32\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">32px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-item\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">24px<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"scale-item\" style=\"opacity:0.35;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <rect x=\"0.75\" y=\"0.75\" width=\"46.5\" height=\"46.5\" rx=\"12\" fill=\"#1C1C1C\" stroke=\"rgba(255,255,255,0.09)\" stroke-width=\"1.5\"><\u002Frect>\n          <line x1=\"15\" y1=\"12\" x2=\"15\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"12\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"15\" y1=\"24\" x2=\"35\" y2=\"36\" stroke=\"#1D9E75\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fline>\n          <circle cx=\"15\" cy=\"24\" r=\"3.5\" fill=\"#1D9E75\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"scale-sz\">20px — mínimo<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════════════════════════\n       05 — CONCEITO\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">05 — Conceito<\u002Fdiv>\n    <h2 class=\"sec-title\">O que é a marca Klarivy<\u002Fh2>\n    <p class=\"sec-desc\">A identidade como sistema de valores — não apenas como forma.<\u002Fp>\n\n    <div class=\"concept-cols\">\n      <div>\n        <div class=\"cb\">\n          <h3>O símbolo<\u002Fh3>\n          <p>A marca Klarivy é construída a partir da geometria precisa da letra K — decomposta em três elementos fundamentais: uma haste vertical, dois braços diagonais com angulação de 28°, e um nó central que os unifica no ponto de junção.<\u002Fp>\n          <p>O nó é o coração da marca. Representa o momento exato em que dados dispersos se tornam clareza — a convergência entre análise e insight. É o verde esmeralda da plataforma: a cor de resultado positivo, diagnóstico bem-sucedido, conversão alcançada.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cb\">\n          <h3>O nome<\u002Fh3>\n          <p>\"Klarivy\" evoca clareza (<em>klarity<\u002Fem>) com uma torção contemporânea. Breve, memorável, único. Soa como tecnologia de ponta sem carregar o peso de metáforas neurológicas explícitas — deixando espaço para o produto falar por si.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"cb\">\n          <h3>O wordmark<\u002Fh3>\n          <p>Caixa baixa, Space Grotesk 700, tracking −0.02em. Geométrica e precisa, com leves peculiaridades de curva que evitam a frieza de uma grotesca pura. O peso 700 confere autoridade sem rigidez. O tracking negativo unifica as sete letras em um bloco coeso.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cb\">\n          <h3>A cor<\u002Fh3>\n          <p>Um único acento cromático: o esmeralda. Toda a identidade opera em torno de fundos escuros neutros e esse acento preciso. Essa restrição é intencional — no produto, o esmeralda já <em>significa algo<\u002Fem>. Usá-lo com critério na identidade prolonga e reforça esse significado.<\u002Fp>\n          <div class=\"chip\">\n            <div class=\"chip-dot\"><\u002Fdiv>\n            #1D9E75 — Esmeralda\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════════════════════════\n       06 — REGRAS\n  ════════════════════════════════════════ -->\n  <section class=\"sec\">\n    <div class=\"sec-lbl\">06 — Regras de uso<\u002Fdiv>\n    <h2 class=\"sec-title\">O que fazer e o que evitar<\u002Fh2>\n    <p class=\"sec-desc\">Consistência é o que transforma uma forma em uma marca.<\u002Fp>\n\n    <div class=\"g2\" style=\"gap:16px;\">\n      <div class=\"rule rule-do\">\n        <span class=\"rule-tag\">✓ Faça<\u002Fspan>\n        <p>Use o lockup horizontal como configuração principal em headers, navegação e documentos.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule rule-dont\">\n        <span class=\"rule-tag\">✕ Evite<\u002Fspan>\n        <p>Não distorça, estique ou altere as proporções do símbolo ou do wordmark em nenhuma dimensão.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule rule-do\">\n        <span class=\"rule-tag\">✓ Faça<\u002Fspan>\n        <p>Use exclusivamente sobre fundos escuros, brancos ou esmeralda. Mantenha um espaço de proteção igual ao tamanho do símbolo em todos os lados.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule rule-dont\">\n        <span class=\"rule-tag\">✕ Evite<\u002Fspan>\n        <p>Não aplique a marca sobre fotografia ou fundos com textura. Não altere as cores do símbolo, do wordmark ou do container.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule rule-do\">\n        <span class=\"rule-tag\">✓ Faça<\u002Fspan>\n        <p>Use o símbolo isolado (sem wordmark) apenas quando a marca já for reconhecida no contexto, como favicons e avatares.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rule rule-dont\">\n        <span class=\"rule-tag\">✕ Evite<\u002Fspan>\n        <p>Não adicione sombras, outlines, gradientes ou efeitos decorativos sobre a marca. Não recrie o símbolo em outra ferramenta.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv><!-- /.wrap -->\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
