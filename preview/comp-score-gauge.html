<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg-base); padding: 24px; display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  /* Score Gauge */
  .gauge-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .gauge { position:relative; width:140px; height:140px; }
  .gauge svg { width:140px; height:140px; }
  .gauge-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .gauge-score { font-family:'Space Grotesk',sans-serif; font-size:42px; font-weight:700; line-height:1; letter-spacing:-1px; }
  .gauge-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
  .gauge-title { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--color-fg-2); text-align:center; }
</style>
</head>
<body>
  <!-- Good Score -->
  <div class="gauge-wrap">
    <div class="gauge">
      <svg viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#141414" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="#22C55E" stroke-width="10"
          stroke-dasharray="364.4" stroke-dashoffset="72.88"
          stroke-linecap="round" transform="rotate(-90 70 70)"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-score" style="color:#22C55E">87</div>
        <div class="gauge-label" style="color:#22C55E">Bom</div>
      </div>
    </div>
    <div class="gauge-title">Score geral</div>
  </div>
  <!-- Warning Score -->
  <div class="gauge-wrap">
    <div class="gauge">
      <svg viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#141414" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="#F59E0B" stroke-width="10"
          stroke-dasharray="364.4" stroke-dashoffset="182.2"
          stroke-linecap="round" transform="rotate(-90 70 70)"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-score" style="color:#F59E0B">50</div>
        <div class="gauge-label" style="color:#F59E0B">Atenção</div>
      </div>
    </div>
    <div class="gauge-title">Score geral</div>
  </div>
  <!-- Critical Score -->
  <div class="gauge-wrap">
    <div class="gauge">
      <svg viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#141414" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="#EF4444" stroke-width="10"
          stroke-dasharray="364.4" stroke-dashoffset="307.5"
          stroke-linecap="round" transform="rotate(-90 70 70)"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-score" style="color:#EF4444">16</div>
        <div class="gauge-label" style="color:#EF4444">Crítico</div>
      </div>
    </div>
    <div class="gauge-title">Score geral</div>
  </div>
  <!-- Small gauge -->
  <div class="gauge-wrap">
    <div class="gauge" style="width:80px;height:80px">
      <svg viewBox="0 0 80 80" width="80" height="80">
        <circle cx="40" cy="40" r="32" fill="none" stroke="#141414" stroke-width="7"/>
        <circle cx="40" cy="40" r="32" fill="none" stroke="#1D9E75" stroke-width="7"
          stroke-dasharray="201.1" stroke-dashoffset="54.3"
          stroke-linecap="round" transform="rotate(-90 40 40)"/>
      </svg>
      <div class="gauge-center">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#1D9E75;line-height:1">73</div>
      </div>
    </div>
    <div class="gauge-title">Clareza</div>
  </div>
</body>
</html>
