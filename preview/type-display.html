<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg-base); padding: 24px; display: flex; flex-direction: column; gap: 18px; }
  .specimen { display: flex; flex-direction: column; gap: 2px; padding-bottom: 14px; border-bottom: 1px solid var(--color-border); }
  .specimen:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta">Space Grotesk 700 · 72px · Score</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:700;line-height:1;letter-spacing:-2px;color:#1D9E75">87</div>
  </div>
  <div class="specimen">
    <div class="meta">Space Grotesk 700 · 40px · Display</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;line-height:1.1;letter-spacing:-1px;color:#FFFFFF">Otimize sua conversão</div>
  </div>
  <div class="specimen">
    <div class="meta">Space Grotesk 600 · 28px · H1</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;line-height:1.25;letter-spacing:-0.5px;color:#FFFFFF">Análise de Landing Page</div>
  </div>
  <div class="specimen">
    <div class="meta">Space Grotesk 600 · 22px · H2</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;line-height:1.25;color:#FFFFFF">Score por categoria</div>
  </div>
</body>
</html>
