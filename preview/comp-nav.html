<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg-base); padding: 0; margin: 0; display: flex; height: 300px; }
  .sidebar {
    width: 220px; background: var(--color-bg-surface); border-right: 1px solid var(--color-border);
    display: flex; flex-direction: column; padding: 16px 12px; gap: 2px; flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; padding: 4px 8px 16px; margin-bottom: 4px; border-bottom: 1px solid var(--color-border); }
  .logo-icon { width: 24px; height: 24px; }
  .logo-text { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--color-fg-1); }
  .logo-text span { color: var(--color-primary); }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--color-fg-2);
    transition: all 150ms;
  }
  .nav-item.active { background: var(--color-primary-muted); color: var(--color-primary); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-section { font-family: var(--font-ui); font-size: 10px; font-weight: 600; color: var(--color-fg-3); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 10px 4px; }
  .content { flex: 1; padding: 20px; background: var(--color-bg-base); display: flex; flex-direction: column; gap: 4px; }
  .page-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--color-fg-1); }
  .page-sub { font-family: var(--font-ui); font-size: 13px; color: var(--color-fg-2); }
</style>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
        <rect x="4" y="6" width="6" height="24" rx="3" fill="#1D9E75"/>
        <polygon points="10,6 16,6 22,30 16,30" fill="#1D9E75"/>
        <rect x="16" y="6" width="6" height="24" rx="3" fill="#1D9E75"/>
        <circle cx="28" cy="9" r="3" fill="#25C98F"/>
      </svg>
      <div class="logo-text">Neuro<span>Convert</span></div>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Laudos
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      Histórico
    </div>
    <div class="nav-section">Conta</div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Perfil
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Configurações
    </div>
  </nav>
  <div class="content">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Bem-vindo de volta, Rafael</div>
  </div>
</body>
</html>
